<!doctype html>
<html lang="{{ site.lang | default: 'en-US' }}">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {% seo %}

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <script>
    (function () {
      try {
        var saved = localStorage.getItem('docs-keeper-theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
</head>
<body>
  <section class="page-header">
    <h1 class="project-name">{{ site.title }}</h1>
    <h2 class="project-tagline">{{ site.description }}</h2>

    <a href="#install" class="btn">Install</a>
    <a href="https://github.com/kostiantyn-matsebora/docs-keeper" class="btn">View on GitHub</a>
    <a href="https://github.com/kostiantyn-matsebora/docs-keeper/releases" class="btn">Releases</a>

    <button class="btn theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark/light mode">
      <span class="theme-toggle-icon" aria-hidden="true">
        <span data-icon="light">☀</span>
        <span data-icon="dark">☾</span>
      </span>
      <span class="theme-toggle-text"></span>
    </button>
  </section>

  <section class="main-content">
    {% unless page.no_toc %}
      <aside class="page-toc" aria-label="On this page" data-auto-toc></aside>
    {% endunless %}

    {{ content }}

    <footer class="site-footer">
      <a href="https://github.com/kostiantyn-matsebora/docs-keeper">docs-keeper</a> · MIT-licensed ·
      a documentation steward for Claude Code.
    </footer>
  </section>

  <script src="{{ '/assets/js/theme-toggle.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/page-toc.js' | relative_url }}"></script>
</body>
</html>
