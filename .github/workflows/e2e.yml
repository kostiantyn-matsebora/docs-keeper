name: e2e

# End-to-end test of docs-keeper as an installed Claude Code plugin.
#
# Two tiers:
#   * engine-e2e   — deterministic, no secrets. Builds the plugin, asserts every
#                    asset ships, and exercises the real hook entrypoints (the
#                    PreToolUse commit gate + the neutral CI drift gate) by path
#                    against a throwaway git fixture. Always runs.
#   * agentic-e2e  — drives a real headless Claude Code session that imitates a
#                    user: installs the plugin, runs /docs-keeper:setup, makes
#                    code + doc changes, and proves the drift hooks keep the docs
#                    synchronized. Gated on the ANTHROPIC_API_KEY (agent) and
#                    EXAMPLE_REPO_TOKEN (clone of the private example host repo)
#                    secrets; skipped with a warning when they are absent.

on:
  workflow_dispatch:
    inputs:
      extended:
        description: "Also run the extended agentic coverage (fixture-based setup/registry cases — more agent sessions, more cost)."
        type: boolean
        default: false
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Tier 1 — deterministic engine / hook e2e (no API key required)
  # ---------------------------------------------------------------------------
  engine-e2e:
    name: deterministic engine + hook e2e
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Assemble plugin from core (vendored trees in sync)
        run: python3 build/assemble.py --check

      - name: Assert installed plugin ships every asset
        run: python3 e2e/assert_e2e.py install --plugin-root adapters/claude-code

      - name: Build a throwaway host repo with documentation drift
        run: |
          set -euo pipefail
          fix="$RUNNER_TEMP/gitfix"
          mkdir -p "$fix/docs"
          cd "$fix"
          git init -q
          git config user.email e2e@docs-keeper.test
          git config user.name "docs-keeper e2e"
          # An indexed dir whose index.md declares NO children yet.
          printf -- '---\ntitle: Docs\nintro: '"'"'Docs.'"'"'\n---\n' > docs/index.md
          printf '# Host\n\n## Sources of truth\n\n- `docs/` — Docs.\n' > CLAUDE.md
          git add -A && git commit -qm "baseline"
          # Stage a new doc the index does NOT declare -> index drift + unrevised md.
          printf '# Payments\n\nPayment processing.\n' > docs/payments.md
          git add docs/payments.md
          echo "FIXTURE=$fix" >> "$GITHUB_ENV"

      - name: PreToolUse commit gate blocks the drifting commit (exit 2)
        run: |
          set -uo pipefail
          cd adapters/claude-code/hooks
          payload='{"tool_input":{"command":"git commit -m wip"},"session_id":"e2e"}'
          set +e
          out="$(printf '%s' "$payload" | CLAUDE_PROJECT_DIR="$FIXTURE" python3 cc_maintenance.py 2>&1)"
          code=$?
          set -e
          echo "$out"
          echo "gate exit: $code"
          test "$code" -eq 2
          echo "$out" | grep -qi "drift"

      - name: Neutral CI drift gate flags the drift (exit 2)
        run: |
          set +e
          python3 core/engine/cli.py --drift-only --repo-root "$FIXTURE" --enforce block
          code=$?
          set -e
          echo "drift gate exit: $code"
          test "$code" -eq 2

      - name: After indexing the new doc, both gates are clean (exit 0)
        run: |
          set -euo pipefail
          # Resolve the drift the way the agent would: declare the new child.
          printf -- '---\ntitle: Docs\nintro: '"'"'Docs.'"'"'\nchildren:\n  - /payments\n---\n' \
            > "$FIXTURE/docs/index.md"
          python3 e2e/assert_e2e.py index-declares --index "$FIXTURE/docs/index.md" --child /payments
          python3 core/engine/cli.py --drift-only --repo-root "$FIXTURE" --enforce block
          echo "clean drift gate exit: $?"

      - name: Install pytest
        run: python3 -m pip install --quiet pytest

      - name: Black-box engine + hook cases (CODE/DOC/EDGE/CFG by path)
        run: python3 -m pytest e2e/blackbox_test.py -q

  # ---------------------------------------------------------------------------
  # Preflight — decide whether the agentic tier can run (secrets present?)
  # ---------------------------------------------------------------------------
  preflight:
    name: agentic preflight (secret check)
    runs-on: ubuntu-latest
    outputs:
      run_agentic: ${{ steps.check.outputs.run_agentic }}
    steps:
      - id: check
        env:
          # Either an Anthropic Console API key OR a Claude subscription token
          # (claude setup-token) satisfies the agent auth requirement.
          HAS_KEY: ${{ (secrets.ANTHROPIC_API_KEY != '' || secrets.CLAUDE_CODE_OAUTH_TOKEN != '') }}
          HAS_TOKEN: ${{ secrets.EXAMPLE_REPO_TOKEN != '' }}
        run: |
          if [ "$HAS_KEY" = "true" ] && [ "$HAS_TOKEN" = "true" ]; then
            echo "run_agentic=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_agentic=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Agentic e2e skipped — set repo secrets ANTHROPIC_API_KEY and EXAMPLE_REPO_TOKEN to enable it."
          fi

  # ---------------------------------------------------------------------------
  # Tier 2 — full agentic e2e (real Claude Code session imitating a user)
  # ---------------------------------------------------------------------------
  agentic-e2e:
    name: full agentic e2e (headless Claude Code)
    needs: preflight
    if: needs.preflight.outputs.run_agentic == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DK: ${{ github.workspace }}/docs-keeper
      EX: ${{ github.workspace }}/example
      # Prefer a subscription token when present; only fall back to the API key
      # otherwise, so a stale/invalid ANTHROPIC_API_KEY can't shadow the token.
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN == '' && secrets.ANTHROPIC_API_KEY || '' }}
      # Broad enough that the agent never stalls on a permission prompt in -p mode.
      DK_TOOLS: "Bash,Read,Edit,Write,Glob,Grep,Skill,TodoWrite"
      DK_FLAGS: "--permission-mode acceptEdits --output-format json"
    steps:
      - name: Checkout docs-keeper
        uses: actions/checkout@v6
        with:
          path: docs-keeper

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Re-assemble plugin (fresh vendored core)
        run: python3 "$DK/build/assemble.py"

      - name: Clone the private example host repo
        env:
          EXAMPLE_REPO_TOKEN: ${{ secrets.EXAMPLE_REPO_TOKEN }}
        run: |
          set -euo pipefail
          git clone --depth 1 \
            "https://x-access-token:${EXAMPLE_REPO_TOKEN}@github.com/kostiantyn-matsebora/docs-keeper-example.git" \
            "$EX"
          git -C "$EX" config user.email e2e@docs-keeper.test
          git -C "$EX" config user.name "docs-keeper e2e"
          # Drop the token-bearing push remote: the e2e only commits locally, and the
          # agent must never be able to push to the example repo.
          git -C "$EX" remote remove origin

      # --- Phase 1: install the plugin at PROJECT scope + assert it loaded -----
      - name: Install docs-keeper into the example repo at project scope
        working-directory: ${{ env.EX }}
        run: |
          set -euo pipefail
          # Register the local marketplace for discovery, then enable the plugin
          # at PROJECT scope: the enablement lands in the example repo's
          # .claude/settings.json (committed, team-shared) — not user settings.
          # Mirrors how a team installs docs-keeper for one repository.
          claude plugin marketplace add "$DK"
          claude plugin install docs-keeper@docs-keeper --scope project
          echo "== example repo .claude/settings.json (project scope) =="
          cat .claude/settings.json
          echo "== plugin status (must be loaded, hooks active) =="
          claude plugin list
          # Fail if the plugin did not load (e.g. hooks rejected — Finding F1).
          claude plugin list | grep -qi "docs-keeper"
          ! claude plugin list | grep -qi "failed to load"

      - name: Assert plugin assets are all in place
        run: python3 "$DK/e2e/assert_e2e.py" install --plugin-root "$DK/adapters/claude-code"

      - name: INST-09 — claude plugin validate --strict
        run: claude plugin validate --strict "$DK/adapters/claude-code"

      # --- Phase 2: run setup and assert a green baseline ----------------------
      - name: Run /docs-keeper:setup
        working-directory: ${{ env.EX }}
        run: |
          set -uo pipefail
          claude -p "/docs-keeper:setup" --allowedTools "$DK_TOOLS" $DK_FLAGS \
            > "$RUNNER_TEMP/setup.json" 2>&1 || true
          cat "$RUNNER_TEMP/setup.json"
          python3 "$DK/e2e/check_session.py" "$RUNNER_TEMP/setup.json"

      - name: Assert setup reached a green baseline
        run: |
          set -uo pipefail
          echo "== .docs-keeper/config.json =="; cat "$EX/.docs-keeper/config.json" 2>/dev/null || echo "(none)"
          echo "== index.md files =="; find "$EX" -name index.md -not -path '*/.git/*'
          echo "== residual drift queue (expect none) =="
          python3 "$DK/core/engine/cli.py" --drift-only --repo-root "$EX" --enforce block || true
          set -e
          python3 "$DK/e2e/assert_e2e.py" setup --repo "$EX"
          # Setup's contract is a green baseline: the drift gate must be clean.
          python3 "$DK/core/engine/cli.py" --drift-only --repo-root "$EX" --enforce block

      - name: INST-08 — SessionStart hook wrote a session snapshot
        run: |
          set -euo pipefail
          ls -la "$EX/.docs-keeper" || true
          ls "$EX"/.docs-keeper/session.*.json >/dev/null 2>&1 \
            || { echo "::error::no SessionStart snapshot under .docs-keeper/"; exit 1; }

      - name: SETUP-05 — setup is idempotent (re-run writes no changes)
        working-directory: ${{ env.EX }}
        run: |
          set -uo pipefail
          git add -A && git commit -qm "setup baseline" || true
          claude -p "/docs-keeper:setup" --allowedTools "$DK_TOOLS" $DK_FLAGS \
            > "$RUNNER_TEMP/setup-rerun.json" 2>&1 || true
          python3 "$DK/e2e/check_session.py" "$RUNNER_TEMP/setup-rerun.json"
          set -e
          # A second setup on a green repo must make no source changes.
          test -z "$(git status --porcelain)" || { echo "::error::setup not idempotent:"; git status --porcelain; exit 1; }
          echo "setup idempotent: working tree clean after re-run"

      - name: Resolve an indexed directory to mutate
        run: |
          set -euo pipefail
          dir="$(cd "$EX" && python3 -c "import os,sys; sys.path.insert(0,'$DK'); from e2e.assert_e2e import find_index_files; fs=find_index_files('.'); print(os.path.dirname(fs[0]) if fs else '.')")"
          echo "INDEX_DIR=${dir#./}" >> "$GITHUB_ENV"
          echo "Indexed dir under test: ${dir#./}"

      # --- Phase 3: a code change, AUTO-synchronized by the commit gate --------
      # docs-keeper's strict-mode contract: the integrator just commits; the
      # PreToolUse gate auto-detects drift, blocks, and the agent runs the queued
      # *incremental* maintenance (index walk-up + registry-sync) before the
      # commit can land. The test never names the maintenance command — the gate
      # drives it. (The agent itself never commits; role.md § Hand back.)
      - name: Strict mode — a code change is auto-synced when the integrator commits
        working-directory: ${{ env.EX }}
        run: |
          set -uo pipefail
          # Strict mode: a drifting commit MUST be blocked until docs are synced.
          printf '{\n  "enforcement": "block",\n  "paths": ["**/*.md"]\n}\n' > .docs-keeper/config.json
          echo "BASE_COMMITS_CODE=$(git rev-list --count HEAD)" >> "$GITHUB_ENV"
          # A code change: append to the first source file we find (else create one).
          src="$(find . -type f \( -name '*.py' -o -name '*.ts' -o -name '*.js' -o -name '*.go' -o -name '*.cs' -o -name '*.java' \) \
                  -not -path '*/node_modules/*' -not -path '*/.git/*' | head -n1)"
          if [ -z "$src" ]; then src="src/payments_processor.py"; mkdir -p src; fi
          printf '\n# e2e: payments processor added by the e2e run\n' >> "$src"
          # Its companion doc — not yet declared in the index, so the tree drifts.
          printf '# Payments processor\n\nProcesses payments for the Acme Stack.\n' > "${INDEX_DIR}/payments-processor.md"
          git add -A
          # Confirm the gate WOULD block this commit (drift present).
          set +e; python3 "$DK/core/engine/cli.py" --drift-only --repo-root "$EX" --enforce block; gate=$?; set -e
          test "$gate" -eq 2
          # Integrator action: just commit. The gate auto-drives the sync.
          claude -p "Commit the staged changes with a clear message. If a documentation drift gate blocks the commit, follow its instructions to synchronize the documentation, re-stage, and commit again. Do not bypass the gate (no --no-verify)." \
            --allowedTools "$DK_TOOLS" $DK_FLAGS > "$RUNNER_TEMP/code-change.json" 2>&1 || true
          cat "$RUNNER_TEMP/code-change.json"
          python3 "$DK/e2e/check_session.py" "$RUNNER_TEMP/code-change.json"

      - name: Assert the code change was auto-synchronized
        run: |
          set -euo pipefail
          # docs-keeper's guarantee: drift cleared incrementally + the new doc declared.
          python3 "$DK/core/engine/cli.py" --drift-only --repo-root "$EX" --enforce block
          python3 "$DK/e2e/assert_e2e.py" index-declares \
            --index "$EX/${INDEX_DIR}/index.md" --child /payments-processor
          # Best-effort only: whether the integrator's commit landed. docs-keeper never
          # commits (role.md); the agent's git-commit shell form is sometimes blocked by
          # Claude Code's permission layer, which is outside docs-keeper's scope.
          now="$(git -C "$EX" rev-list --count HEAD)"
          echo "commits: base=$BASE_COMMITS_CODE now=$now (commit best-effort, not asserted)"
          git -C "$EX" log --oneline -n 3 || true

      # --- Phase 4: a documentation change, AUTO-synchronized by the commit gate
      - name: Strict mode — a documentation change is auto-synced when the integrator commits
        working-directory: ${{ env.EX }}
        run: |
          set -uo pipefail
          echo "BASE_COMMITS_DOC=$(git rev-list --count HEAD)" >> "$GITHUB_ENV"
          # Edit docs directly: a new doc the directory index does not declare yet.
          printf '# Refunds\n\nRefund handling for the Acme Stack.\n' > "${INDEX_DIR}/refunds.md"
          git add -A
          set +e; python3 "$DK/core/engine/cli.py" --drift-only --repo-root "$EX" --enforce block; gate=$?; set -e
          test "$gate" -eq 2
          claude -p "Commit the staged changes with a clear message. If a documentation drift gate blocks the commit, follow its instructions to synchronize the documentation, re-stage, and commit again. Do not bypass the gate (no --no-verify)." \
            --allowedTools "$DK_TOOLS" $DK_FLAGS > "$RUNNER_TEMP/doc-change.json" 2>&1 || true
          cat "$RUNNER_TEMP/doc-change.json"
          python3 "$DK/e2e/check_session.py" "$RUNNER_TEMP/doc-change.json"

      - name: Assert the documentation change was auto-synchronized
        run: |
          set -euo pipefail
          python3 "$DK/core/engine/cli.py" --drift-only --repo-root "$EX" --enforce block
          python3 "$DK/e2e/assert_e2e.py" index-declares \
            --index "$EX/${INDEX_DIR}/index.md" --child /refunds
          # Best-effort only (see code-change phase): docs-keeper never commits.
          now="$(git -C "$EX" rev-list --count HEAD)"
          echo "commits: base=$BASE_COMMITS_DOC now=$now (commit best-effort, not asserted)"
          git -C "$EX" log --oneline -n 3 || true

      # --- Phase 5: command coverage on the example repo (reuses the clone) ----
      - name: REG-01 — registry-sync reconciles a stale registry line
        working-directory: ${{ env.EX }}
        run: |
          set -uo pipefail
          idx="${INDEX_DIR%/}/index.md"; idx="${idx#./}"; [ "$idx" = "/index.md" ] && idx="index.md"
          python3 - "$idx" <<'PY'
          import re, sys
          p = sys.argv[1]; s = open(p, encoding="utf-8").read()
          s = re.sub(r"(?m)^intro:.*$", "intro: 'Registry reconcile probe intro.'", s, count=1)
          open(p, "w", encoding="utf-8").write(s)
          PY
          set +e; python3 "$DK/core/engine/cli.py" --drift-only --repo-root "$EX" --enforce block; gate=$?; set -e
          test "$gate" -eq 2   # registry line now stale vs the index intro
          claude -p "/docs-keeper:registry-sync" --allowedTools "$DK_TOOLS" $DK_FLAGS \
            > "$RUNNER_TEMP/registry-sync.json" 2>&1 || true
          python3 "$DK/e2e/check_session.py" "$RUNNER_TEMP/registry-sync.json"
          set -e
          python3 "$DK/core/engine/cli.py" --drift-only --repo-root "$EX" --enforce block
          echo "REG-01: registry reconciled, drift clean"

      - name: REV-01 — revise tightens a doc without introducing drift
        working-directory: ${{ env.EX }}
        run: |
          set -uo pipefail
          claude -p "/docs-keeper:revise ${INDEX_DIR%/}/refunds.md" --allowedTools "$DK_TOOLS" $DK_FLAGS \
            > "$RUNNER_TEMP/revise.json" 2>&1 || true
          python3 "$DK/e2e/check_session.py" "$RUNNER_TEMP/revise.json"
          set -e
          test -f "${INDEX_DIR%/}/refunds.md"   # doc still present
          python3 "$DK/core/engine/cli.py" --drift-only --repo-root "$EX" --enforce block

      - name: SWEEP-01 — sweep runs and produces a report
        working-directory: ${{ env.EX }}
        run: |
          set -uo pipefail
          claude -p "/docs-keeper:sweep" --allowedTools "$DK_TOOLS" $DK_FLAGS \
            > "$RUNNER_TEMP/sweep.json" 2>&1 || true
          cat "$RUNNER_TEMP/sweep.json"
          python3 "$DK/e2e/check_session.py" "$RUNNER_TEMP/sweep.json"
          test -s "$RUNNER_TEMP/sweep.json"   # produced output

      # --- Phase 6 (extended): fixture-based setup/registry cases --------------
      # Gated behind the workflow_dispatch `extended` input — each spins a fresh
      # repo + agent session, so it is opt-in to keep the weekly run lean.
      - name: SETUP-06/08/09 — skeleton + non-clobber + config preserved (extended)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.extended }}
        run: |
          set -uo pipefail
          F="$RUNNER_TEMP/fx1"; mkdir -p "$F/docs"
          git -C "$F" init -q; git -C "$F" config user.email e2e@dk.test; git -C "$F" config user.name dk
          mkdir -p "$F/.docs-keeper"
          printf '{\n  "enforcement": "warn",\n  "paths": ["docs/**/*.md"]\n}\n' > "$F/.docs-keeper/config.json"
          printf -- '---\ntitle: Docs\nintro: '"'"'Hand authored.'"'"'\n---\n\n<!-- HANDAUTHORED-MARKER -->\n' > "$F/docs/index.md"
          printf '# Guide\n' > "$F/docs/guide.md"   # NO CLAUDE.md — setup must create it
          ( cd "$F" && claude plugin install docs-keeper@docs-keeper --scope project >/dev/null 2>&1 || true )
          ( cd "$F" && claude -p "/docs-keeper:setup" --allowedTools "$DK_TOOLS" $DK_FLAGS > "$RUNNER_TEMP/fx1.json" 2>&1 || true )
          python3 "$DK/e2e/check_session.py" "$RUNNER_TEMP/fx1.json"
          set -e
          test -f "$F/CLAUDE.md"                                  # SETUP-06: skeleton created
          grep -qi "sources of truth" "$F/CLAUDE.md"             # SETUP-06: section seeded
          grep -q "HANDAUTHORED-MARKER" "$F/docs/index.md"       # SETUP-08: hand-authored index not clobbered
          grep -qF 'docs/**/*.md' "$F/.docs-keeper/config.json"  # SETUP-09: existing config preserved

      - name: SETUP-07 — scoped setup touches only the named root (extended)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.extended }}
        run: |
          set -uo pipefail
          F="$RUNNER_TEMP/fx2"; mkdir -p "$F/docs" "$F/other"
          git -C "$F" init -q; git -C "$F" config user.email e2e@dk.test; git -C "$F" config user.name dk
          printf '# D\n' > "$F/docs/d.md"; printf '# O\n' > "$F/other/o.md"; printf '# Host\n' > "$F/CLAUDE.md"
          ( cd "$F" && claude plugin install docs-keeper@docs-keeper --scope project >/dev/null 2>&1 || true )
          ( cd "$F" && claude -p "/docs-keeper:setup docs/" --allowedTools "$DK_TOOLS" $DK_FLAGS > "$RUNNER_TEMP/fx2.json" 2>&1 || true )
          python3 "$DK/e2e/check_session.py" "$RUNNER_TEMP/fx2.json"
          set -e
          test -f "$F/docs/index.md"        # docs/ indexed
          test ! -f "$F/other/index.md"     # other/ left untouched

      - name: REG-02 — registry-sync refuses to cold-create the section (extended)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.extended }}
        run: |
          set -uo pipefail
          F="$RUNNER_TEMP/fx3"; mkdir -p "$F/docs"
          git -C "$F" init -q; git -C "$F" config user.email e2e@dk.test; git -C "$F" config user.name dk
          printf -- '---\ntitle: Docs\nintro: '"'"'D.'"'"'\nchildren:\n  - /d\n---\n' > "$F/docs/index.md"
          printf '# D\n' > "$F/docs/d.md"
          printf '# Host\n\n(intentionally no Sources of truth section)\n' > "$F/CLAUDE.md"
          ( cd "$F" && claude plugin install docs-keeper@docs-keeper --scope project >/dev/null 2>&1 || true )
          ( cd "$F" && claude -p "/docs-keeper:registry-sync" --allowedTools "$DK_TOOLS" $DK_FLAGS > "$RUNNER_TEMP/fx3.json" 2>&1 || true )
          python3 "$DK/e2e/check_session.py" "$RUNNER_TEMP/fx3.json"
          set -e
          ! grep -qi "sources of truth" "$F/CLAUDE.md"   # halted — did NOT cold-create

      - name: Upload session transcripts and resulting docs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: |
            ${{ runner.temp }}/*.json
            ${{ env.EX }}/**/index.md
            ${{ env.EX }}/CLAUDE.md
            ${{ env.EX }}/.docs-keeper/config.json
          if-no-files-found: ignore
