name: Bug report
description: Report incorrect docs-keeper behavior, documentation mismatches, or setup problems.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue. Please include enough detail to reproduce it reliably.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - README / docs
        - core engine (drift / session / capture / config)
        - command procedures (spec/commands)
        - Claude Code adapter (hooks / commands / agent)
        - commit-time drift gate
        - neutral CI gate (cli.py)
        - other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly and concretely.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: docs-keeper version or commit
      placeholder: e.g. v0.3.0 or a commit SHA
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Error output, the drift queue / hook message, repo layout, or anything else useful.
